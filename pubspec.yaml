name: church_management_system
description: "ChurchConnect - Digital Church Management System"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  animate_do: ^3.3.4

  # Utilities
  url_launcher: ^6.3.0
  http: ^1.2.0
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2

  # Google Sheets
  gsheets: 0.5.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Email
  mailer: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/church-logo.jpg
